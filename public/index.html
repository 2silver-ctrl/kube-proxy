<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <title>Kube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="baremux/index.js"></script>
  <script src="uv/uv.bundle.js"></script>
  <script src="uv/uv.config.js"></script>
  <style>
    :root{--bg:#0e0e14;--surf:#15151f;--surf2:#1c1c2a;--b1:rgba(160,120,255,.12);--b2:rgba(160,120,255,.24);--p:#c084fc;--pdim:#9b5de5;--pglow:rgba(192,132,252,.2);--psoft:rgba(192,132,252,.08);--text:#e8e0f5;--muted:#7a6e90}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
    .orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
    .o1{width:520px;height:520px;background:rgba(155,93,229,.11);top:-140px;left:-120px;animation:orb 8s ease-in-out infinite alternate}
    .o2{width:420px;height:420px;background:rgba(192,132,252,.07);bottom:-100px;right:-100px;animation:orb 10s ease-in-out infinite alternate-reverse}
    @keyframes orb{from{transform:translate(0,0)}to{transform:translate(30px,20px)}}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
    .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:44px;animation:fadeUp .6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .logo-icon{width:72px;height:72px;border-radius:20px;background:var(--surf2);border:1px solid var(--b2);box-shadow:0 0 30px var(--pglow);display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:36px;height:36px;filter:drop-shadow(0 0 8px var(--p))}
    .logo-img{width:72px;height:72px;border-radius:20px;object-fit:cover;border:1px solid var(--b2);box-shadow:0 0 30px var(--pglow);display:none}
    h1{font-family:'Nunito',sans-serif;font-size:3.2rem;letter-spacing:-.03em;color:var(--p);text-shadow:0 0 40px rgba(192,132,252,.5),0 0 80px rgba(155,93,229,.2);line-height:1}
    .tagline{font-size:.72rem;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;font-weight:300}
    #uv-form{width:100%;max-width:540px;display:flex;align-items:center;background:var(--surf);border:1px solid var(--b2);border-radius:16px;padding:6px 6px 6px 18px;gap:10px;transition:border-color .2s,box-shadow .2s;animation:fadeUp .6s .1s ease both;opacity:0}
    #uv-form:focus-within{border-color:var(--p);box-shadow:0 0 0 4px rgba(192,132,252,.1),0 0 24px var(--pglow)}
    #uv-address{flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text);caret-color:var(--p);padding:8px 0}
    #uv-address::placeholder{color:var(--muted)}
    .go-btn{background:var(--pdim);border:none;border-radius:12px;padding:10px 22px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;color:#fff;cursor:pointer;transition:background .15s,box-shadow .15s,transform .1s;white-space:nowrap}
    .go-btn:hover{background:var(--p);box-shadow:0 0 16px var(--pglow)}
    .go-btn:active{transform:scale(.96)}
    #uv-error{color:#f87171;font-size:.8rem;margin-top:10px;min-height:16px;text-align:center}
    #uv-error-code{display:none}
    .ql-label{font-size:.7rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin:28px 0 12px;font-weight:300;animation:fadeUp .6s .2s ease both;opacity:0}
    .chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:540px;animation:fadeUp .6s .25s ease both;opacity:0}
    .chip{background:var(--surf);border:1px solid var(--b1);border-radius:20px;padding:7px 16px;font-size:.8rem;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s,background .15s,transform .1s;font-family:'DM Sans',sans-serif}
    .chip:hover{border-color:var(--p);color:var(--p);background:var(--psoft);transform:translateY(-1px)}
    footer{margin-top:60px;font-size:.68rem;color:var(--muted);text-align:center;opacity:.5}
    footer a{color:var(--muted);text-decoration:none;margin:0 8px}
    footer a:hover{color:var(--p)}
    #uv-frame{position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;background:white;display:none}
    #back-btn{display:none;position:fixed;top:12px;left:12px;z-index:10000;background:var(--pdim);border:none;border-radius:10px;padding:9px 18px;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;transition:background .15s,box-shadow .15s;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    #back-btn:hover{background:var(--p);box-shadow:0 0 16px var(--pglow)}
  </style>
</head>
<body>
  <div class="orb o1"></div>
  <div class="orb o2"></div>

  <div class="page">
    <div class="logo-wrap">
      
      <img class="logo-img" id="logoImg" src="logo.png" alt="Kube" />
      <div class="logo-icon" id="logoIcon">
        <svg viewBox="0 0 36 36" fill="none">
          <rect x="4" y="4" width="28" height="28" rx="8" stroke="#c084fc" stroke-width="1.8" fill="rgba(192,132,252,.07)"/>
          <path d="M11 13l7 5-7 5" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="19" y1="23" x2="25" y2="23" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>kube</h1>
      <p class="tagline">proxy unblocker yup</p>
    </div>

    <form id="uv-form">
      <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="#7a6e90" stroke-width="1.4"/>
        <line x1="10" y1="10" x2="13.5" y2="13.5" stroke="#7a6e90" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input id="uv-address" type="text" placeholder="enter a URL or search…" autocomplete="off" spellcheck="false" />
      <button class="go-btn" type="submit">Browse</button>
    </form>

    <p id="uv-error"></p>
    <pre id="uv-error-code"></pre>

    <p class="ql-label">Quick access</p>
    <div class="chips">
      <div class="chip" onclick="goTo('https://www.google.com')">Google</div>
      <div class="chip" onclick="goTo('https://www.youtube.com')">YouTube</div>
      <div class="chip" onclick="goTo('https://www.chatgpt.com')">ChatGPT</div>
      <div class="chip" onclick="goTo('https://www.discord.com')">Discord</div>
      <div class="chip" onclick="goTo('https://now.gg/apps/a/19900/b.html')">Roblox</div>
      <div class="chip" onclick="goTo('https://tiktok.com')">TikTok</div>
    </div>

    <footer>
      <div>
      </div>
      <div style="margin-top:6px">Kube · made by the goat</div>
    </footer>
  </div>

  <iframe id="uv-frame"></iframe>
  <button id="back-btn" onclick="closeProxy()">← Home</button>

  <script src="register-sw.js"></script>
  <script src="search.js"></script>
  <script src="index.js"></script>
  <script>
    // Logo swap
    const logoImg = document.getElementById('logoImg');
    if (logoImg.getAttribute('src')) {
      logoImg.style.display = 'block';
      document.getElementById('logoIcon').style.display = 'none';
    }

    // Quick chip helper
    function goTo(url) {
      document.getElementById('uv-address').value = url;
      document.getElementById('uv-form').dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
    }

    // Watch for frame becoming visible and show back button
    const frame = document.getElementById('uv-frame');
    const backBtn = document.getElementById('back-btn');
    new MutationObserver(() => {
      backBtn.style.display = frame.style.display === 'block' ? 'block' : 'none';
    }).observe(frame, { attributes: true, attributeFilter: ['style'] });

    // Close proxy
    function closeProxy() {
      frame.style.display = 'none';
      frame.src = '';
      backBtn.style.display = 'none';
    }
  </script>
</body>
</html>
